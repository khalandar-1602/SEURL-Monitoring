<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Monitor Dashboard</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --bg-card-hover: #263347;
      --border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.1);
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --processing: #8b5cf6;
      --processing-bg: rgba(139, 92, 246, 0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: "Segoe UI", -apple-system, system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .schedule-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .schedule-indicator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--success);
    }

    .schedule-indicator.running {
      background: var(--processing-bg);
      border-color: rgba(139, 92, 246, 0.25);
      color: var(--processing);
    }

    .schedule-indicator.running .schedule-dot {
      background: var(--processing);
    }

    .schedule-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
    }

    .schedule-next {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Stats Bar */
    .stats-bar {
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--accent);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .stat-total .stat-value { color: var(--accent); }
    .stat-success .stat-value { color: var(--success); }
    .stat-failed .stat-value { color: var(--error); }
    .stat-pending .stat-value { color: var(--warning); }

    /* Progress Bar */
    .progress-container {
      max-width: 1400px;
      margin: 0 auto 24px;
      padding: 0 32px;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar-wrap {
      background: var(--bg-secondary);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 99px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Results Grid */
    .results-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 48px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 16px;
    }

    /* URL Card */
    .url-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .url-card:hover {
      border-color: var(--text-muted);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .url-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .url-index {
      min-width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      flex-shrink: 0;
    }

    .url-info {
      flex: 1;
      min-width: 0;
    }

    .url-text {
      font-size: 0.82rem;
      color: var(--text-secondary);
      word-break: break-all;
      line-height: 1.5;
      font-family: "Cascadia Code", "Fira Code", monospace;
    }

    .url-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Status Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .badge-success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .badge-success .badge-dot { background: var(--success); }

    .badge-failed {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .badge-failed .badge-dot { background: var(--error); }

    .badge-error {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .badge-error .badge-dot { background: var(--error); }

    .badge-processing {
      background: var(--processing-bg);
      color: var(--processing);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .badge-processing .badge-dot {
      background: var(--processing);
      animation: pulse 1.2s infinite;
    }

    .badge-pending {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .badge-pending .badge-dot { background: var(--warning); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .http-code {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .timestamp {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* Screenshot Preview */
    .url-card-body {
      padding: 16px 20px;
    }

    .screenshot-preview {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .screenshot-preview img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top;
      display: block;
      transition: transform 0.3s;
    }

    .screenshot-preview:hover img {
      transform: scale(1.02);
    }

    .screenshot-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .screenshot-preview:hover .screenshot-overlay {
      opacity: 1;
    }

    .screenshot-overlay span {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .no-screenshot {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
    }

    .error-message {
      margin-top: 8px;
      padding: 10px 14px;
      background: var(--error-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      color: var(--error);
      font-size: 0.78rem;
      word-break: break-word;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95vh;
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .results-grid {
        grid-template-columns: 1fr;
      }
      .header-inner {
        padding: 0 16px;
      }
      .stats-bar, .results-section {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">⚡</div>
        <h1>URL <span>Monitor</span></h1>
      </div>
      <div class="schedule-status" id="scheduleStatus">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="schedule-indicator">
            <span class="schedule-dot"></span>
            <span id="scheduleText">Auto-monitoring every 2 hours</span>
          </div>
          <button id="runNowBtn" onclick="triggerRun()" style="
            padding:10px 20px; background:var(--accent); color:#fff; border:none;
            border-radius:var(--radius-sm); font-size:0.9rem; font-weight:600;
            cursor:pointer; transition:background 0.2s;
          " onmouseover="this.style.background='var(--accent-hover)'"
             onmouseout="this.style.background='var(--accent)'">▶ Run Now</button>
        </div>
        <div class="schedule-next" id="scheduleNext"></div>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card stat-total">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">Total URLs</div>
    </div>
    <div class="stat-card stat-success">
      <div class="stat-value" id="statSuccess">0</div>
      <div class="stat-label">Successful</div>
    </div>
    <div class="stat-card stat-failed">
      <div class="stat-value" id="statFailed">0</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-card stat-pending">
      <div class="stat-value" id="statPending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Starting...</div>
  </div>

  <!-- Results -->
  <div class="results-section">
    <div id="resultsContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">🌐</div>
        <h2>No results yet</h2>
        <p>Monitoring runs automatically every 2 hours</p>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="Screenshot" />
  </div>

  <script>
    let eventSource = null;
    let countdownTimer = null;

    function connectToProgress() {
      document.getElementById("progressContainer").classList.add("active");
      document.getElementById("emptyState")?.remove();

      const indicator = document.querySelector(".schedule-indicator");
      indicator.classList.add("running");
      document.getElementById("scheduleText").textContent = "Monitoring in progress...";
      document.getElementById("scheduleNext").textContent = "";

      if (eventSource) eventSource.close();
      eventSource = new EventSource("/api/progress");

      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        renderResults(data.results);
        updateStats(data.results);
        updateProgress(data.results);

        if (!data.isRunning && data.results.length > 0) {
          eventSource.close();
          indicator.classList.remove("running");
          document.getElementById("scheduleText").textContent = "Auto-monitoring every 2 hours";
          document.getElementById("progressContainer").classList.remove("active");
          const btn = document.getElementById("runNowBtn");
          btn.disabled = false;
          btn.textContent = "▶ Run Now";
          fetchScheduleInfo();
        }
      };

      eventSource.onerror = () => {
        eventSource.close();
        indicator.classList.remove("running");
        document.getElementById("scheduleText").textContent = "Auto-monitoring every 2 hours";
        fetchScheduleInfo();
      };
    }

    function fetchScheduleInfo() {
      fetch("/api/schedule")
        .then((r) => r.json())
        .then((data) => {
          if (data.isRunning) {
            connectToProgress();
          } else if (data.nextRunTime) {
            startCountdown(new Date(data.nextRunTime));
          }
        })
        .catch(() => {});
    }

    function startCountdown(nextRun) {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        const now = new Date();
        const diff = nextRun - now;
        if (diff <= 0) {
          document.getElementById("scheduleNext").textContent = "Starting soon...";
          clearInterval(countdownTimer);
          setTimeout(fetchScheduleInfo, 5000);
          return;
        }
        const hrs = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        document.getElementById("scheduleNext").textContent =
          `Next run in ${hrs}h ${mins}m ${secs}s`;
      }, 1000);
    }

    function updateStats(results) {
      const total = results.length;
      const success = results.filter((r) => r.status === "success").length;
      const failed = results.filter((r) => r.status === "failed" || r.status === "error").length;
      const pending = total - success - failed;

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statSuccess").textContent = success;
      document.getElementById("statFailed").textContent = failed;
      document.getElementById("statPending").textContent = pending;
    }

    function updateProgress(results) {
      const total = 21; // Total URLs
      const done = results.filter((r) => r.status !== "processing").length;
      const pct = Math.round((done / total) * 100);
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressText").textContent =
        `Processing ${done} of ${total} URLs (${pct}%)`;
    }

    function renderResults(results) {
      const container = document.getElementById("resultsContainer");
      let html = '<div class="results-grid">';

      results.forEach((r) => {
        const badgeClass =
          r.status === "success" ? "badge-success" :
          r.status === "failed" ? "badge-failed" :
          r.status === "error" ? "badge-error" :
          r.status === "processing" ? "badge-processing" : "badge-pending";

        const statusLabel =
          r.status === "success" ? "Screenshot Taken" :
          r.status === "failed" ? "Failed" :
          r.status === "error" ? "Error" :
          r.status === "processing" ? "Processing..." : "Pending";

        const timeStr = r.timestamp
          ? new Date(r.timestamp).toLocaleTimeString()
          : "";

        html += `
          <div class="url-card">
            <div class="url-card-header">
              <div class="url-index">${r.index}</div>
              <div class="url-info">
                <div class="url-text">${escapeHtml(r.url)}</div>
                <div class="url-meta">
                  <span class="badge ${badgeClass}">
                    <span class="badge-dot"></span>
                    ${statusLabel}
                  </span>
                  ${r.httpStatus ? `<span class="http-code">HTTP ${r.httpStatus}</span>` : ""}
                  ${timeStr ? `<span class="timestamp">${timeStr}</span>` : ""}
                </div>
              </div>
            </div>
            <div class="url-card-body">
              ${r.screenshotFile
                ? `<div class="screenshot-preview" onclick="openLightbox('/screenshots/${r.screenshotFile}')">
                     <img src="/screenshots/${r.screenshotFile}" alt="Screenshot" loading="lazy" />
                     <div class="screenshot-overlay"><span>Click to enlarge</span></div>
                   </div>`
                : r.status === "processing"
                  ? `<div class="no-screenshot">⏳ Capturing...</div>`
                  : `<div class="no-screenshot">No screenshot available</div>`
              }
              ${r.error ? `<div class="error-message">⚠ ${escapeHtml(r.error)}</div>` : ""}
            </div>
          </div>`;
      });

      html += "</div>";
      container.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function openLightbox(src) {
      document.getElementById("lightboxImg").src = src;
      document.getElementById("lightbox").classList.add("open");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    function triggerRun() {
      const btn = document.getElementById("runNowBtn");
      btn.disabled = true;
      btn.textContent = "Starting...";
      fetch("/api/run")
        .then((r) => r.json())
        .then((data) => {
          btn.textContent = "Running...";
          connectToProgress();
        })
        .catch(() => {
          btn.disabled = false;
          btn.textContent = "▶ Run Now";
        });
    }

    // Load existing results and connect to live updates on page load
    fetch("/api/results")
      .then((r) => r.json())
      .then((data) => {
        if (data.results.length > 0) {
          document.getElementById("emptyState")?.remove();
          renderResults(data.results);
          updateStats(data.results);
        }
        if (data.isRunning) {
          document.getElementById("runNowBtn").disabled = true;
          document.getElementById("runNowBtn").textContent = "Running...";
          connectToProgress();
        } else {
          fetchScheduleInfo();
        }
      });
  </script>
</body>
</html>
