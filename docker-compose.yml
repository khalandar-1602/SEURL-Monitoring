version: "3.8"

services:
  url-monitor:
    build: .
    container_name: url-monitor
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - PORT=3000
      - BASE_URL=https://ec2-13-239-33-12.ap-southeast-2.compute.amazonaws.com
    volumes:
      - screenshots:/app/screenshots

volumes:
  screenshots:
